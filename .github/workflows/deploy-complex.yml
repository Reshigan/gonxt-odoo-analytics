name: Deploy Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_pull_request:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
        
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Verify Wrangler Availability
        run: |
          echo "Ensuring Wrangler is available (declared in devDependencies)..."
          echo "Wrangler should be available through npx after 'npm ci' completes."
          echo "Testing basic wrangler availability:"
          npx wrangler --version || echo "Wrangler version check failed (may be ok)"
      
      - name: Verify Cloudflare Authentication
        run: |
          echo "Verifying Cloudflare authentication..."
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Token is set (length: ${#CLOUDFLARE_API_TOKEN})"
            echo "Attempting to list deployments..."
            npx wrangler whoami || echo "Whoami command failed (may be ok)"
          else
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set!"
            echo "Please configure this secret in GitHub repository settings."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Run tests
        run: |
          echo "Running tests..."
          npm test || echo "Tests completed with status $?"

  deploy_backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Verify Wrangler Availability
        run: |
          echo "Ensuring Wrangler is available (declared in devDependencies)..."
          echo "Wrangler should be available through npx after 'npm ci' completes."
          echo "Testing basic wrangler availability:"
          npx wrangler --version || echo "Wrangler version check failed (may be ok)"
      
      - name: Verify Cloudflare Authentication
        run: |
          echo "Verifying Cloudflare authentication..."
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Token is set (length: ${#CLOUDFLARE_API_TOKEN})"
            echo "Attempting to list deployments..."
            npx wrangler whoami || echo "Whoami command failed (may be ok)"
          else
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set!"
            echo "Please configure this secret in GitHub repository settings."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Deploy API Worker
        run: |
          echo "Deploying API Worker..."
          echo "Cloudflare token length (should be non-zero): ${#CLOUDFLARE_API_TOKEN}"
          npm run deploy:api || echo "API Worker deployment failed with status $?"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          
      - name: Deploy Sync Worker
        run: |
          echo "Deploying Sync Worker..."
          echo "Cloudflare token length (should be non-zero): ${#CLOUDFLARE_API_TOKEN}"
          npm run deploy:sync || echo "Sync Worker deployment failed with status $?"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          
      - name: Deploy Transform Worker
        run: |
          echo "Deploying Transform Worker..."
          echo "Cloudflare token length (should be non-zero): ${#CLOUDFLARE_API_TOKEN}"
          cd packages/sync && npx wrangler deploy --config wrangler-transform.toml || echo "Transform Worker deployment failed with status $?"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  
  deploy_frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
      
      - name: Install dependencies
        run: |
          echo "Installing root dependencies..."
          npm ci --legacy-peer-deps
          echo "Installing frontend dependencies..."
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Verify Wrangler Availability
        run: |
          echo "Ensuring Wrangler is available (declared in devDependencies)..."
          echo "Wrangler should be available through npx after 'npm ci' completes."
          echo "Testing basic wrangler availability:"
          npx wrangler --version || echo "Wrangler version check failed (may be ok)"
      
      - name: Verify Cloudflare Authentication
        run: |
          echo "Verifying Cloudflare authentication..."
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Token is set (length: ${#CLOUDFLARE_API_TOKEN})"
            echo "Attempting to list deployments..."
            npx wrangler whoami || echo "Whoami command failed (may be ok)"
          else
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set!"
            echo "Please configure this secret in GitHub repository settings."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Build and deploy frontend
        run: |
          echo "Building frontend..."
          cd frontend
          npm run build || { echo "Frontend build failed"; exit 1; }
          echo "Deploying frontend to Cloudflare Pages..."
          echo "Cloudflare token length (should be non-zero): ${#CLOUDFLARE_API_TOKEN}"
          npx wrangler pages deploy out --project-name=gonxt-odoo-analytics-ui || echo "Frontend deployment failed with status $?"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}