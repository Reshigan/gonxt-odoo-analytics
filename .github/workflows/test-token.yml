name: Test Cloudflare Token

on:
  push:
    branches:
      - main

jobs:
  test_token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Test Cloudflare Token Directly
        run: |
          echo "Testing if CLOUDFLARE_API_TOKEN is available..."
          TOKEN_LENGTH=${#CLOUDFLARE_API_TOKEN}
          echo "Token length: $TOKEN_LENGTH"
          if [ $TOKEN_LENGTH -gt 0 ]; then
            echo "✅ Token is set!"
            echo "First 5 chars: ${CLOUDFLARE_API_TOKEN:0:5}..."
            echo "Last 5 chars: ...${CLOUDFLARE_API_TOKEN:$((TOKEN_LENGTH-5))}"
            
            # Basic format check
            if [[ $CLOUDFLARE_API_TOKEN =~ ^[A-Za-z0-9_\-]+$ ]]; then
              echo "✅ Token format looks valid"
            else
              echo "⚠️  Token format may be invalid"
            fi
          else
            echo "❌ Token is NOT set"
            echo "Go to GitHub Repo Settings → Secrets → Actions to configure CLOUDFLARE_API_TOKEN"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}