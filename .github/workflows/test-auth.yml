name: Test Cloudflare Authentication

on:
  push:
    branches:
      - main

jobs:
  test_auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://registry.npmjs.org/
        
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Test Cloudflare Authentication
        run: |
          echo "Testing Cloudflare authentication with minimal steps..."
          echo "Token length (should be > 0): ${#CLOUDFLARE_API_TOKEN}"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is not set or is empty!"
            exit 1
          elif [ ${#CLOUDFLARE_API_TOKEN} -lt 30 ]; then
            echo "WARNING: Token seems unusually short, might be invalid"
          else
            echo "Token appears to be set correctly"
            echo "Attempting wrangler whoami..."
            npx wrangler whoami
            RC=$?
            if [ $RC -eq 0 ]; then
              echo "SUCCESS: Cloudflare authentication working!"
            else
              echo "WARNING: wrangler whoami failed with code $RC, but token is set"
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}