name = "gonxt-analytics-sync"
main = "src/sync-worker.ts"
compatibility_date = "2024-06-01"

[vars]
ODOO_URL = "https://erp.gonxt.tech"
ODOO_DB = "gonxt"
ODOO_USER = "analytics@gonxt.tech"

# Secrets (set via: wrangler secret put ODOO_PASSWORD)
# ODOO_PASSWORD = "analytics1234#"

[[d1_databases]]
binding = "DB"
database_name = "gonxt-odoo-analytics"
database_id = "e5c40fb1-49f4-456d-8f34-d5df60cde9f9"

[[kv_namespaces]]
binding = "CACHE"
id = "5edac82b359d41e49b3ef07bedfab929"

# Queue producers
[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "odoo-sync-queue"

[[queues.producers]]
binding = "TRANSFORM_QUEUE"
queue = "odoo-transform-queue"

# Queue consumer — this worker consumes sync messages
[[queues.consumers]]
queue = "odoo-sync-queue"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "odoo-sync-dlq"

# Cron Triggers
[triggers]
crons = [
  "0 * * * *",     # Hourly — all data sync
]
